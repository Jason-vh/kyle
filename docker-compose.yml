services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://kyle:kyle@db:5432/kyle
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyle
      POSTGRES_PASSWORD: kyle
      POSTGRES_DB: kyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyle -d kyle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
